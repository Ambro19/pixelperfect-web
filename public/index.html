<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3B82F6" />

    <!-- Primary Meta Tags -->
    <title>PixelPerfect - Screenshot API</title>
    <meta name="title" content="PixelPerfect - Screenshot API" />
    <meta
      name="description"
      content="Pixel-perfect screenshots, every time. Fast, reliable, and developer-friendly screenshot API."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://pixelperfectapi.net/" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://api.pixelperfectapi.net" />

    <!-- =====================================================================
         FAVICONS
         Root cause of wrong browser-tab icons: the old primary favicon pointed
         to "%PUBLIC_URL%/favicon.png" which does NOT exist in public/.
         The browser fell back unpredictably (screenshot thumbnail, cached icon).
         Fix: point all favicon refs to the actual files in public/favicons/.
         The 32x32 PNG is declared first so browsers pick it up as the tab icon.
    ====================================================================== -->

    <!-- ✅ Primary tab icon — must exist; 32x32 is the standard browser tab size -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%PUBLIC_URL%/favicons/favicon-32x32.png"
    />

    <!-- Smaller sizes for legacy browsers / high-DPI fallback -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%PUBLIC_URL%/favicons/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="%PUBLIC_URL%/favicons/favicon-48x48.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="%PUBLIC_URL%/favicons/favicon-64x64.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="%PUBLIC_URL%/favicons/favicon-128x128.png"
    />

    <!-- Apple Touch Icon (iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%PUBLIC_URL%/favicons/apple-touch-icon.png"
    />

    <!-- Android Chrome -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="%PUBLIC_URL%/favicons/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="%PUBLIC_URL%/favicons/android-chrome-512x512.png"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- OpenGraph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pixelperfectapi.net/" />
    <meta property="og:title" content="PixelPerfect - Screenshot API" />
    <meta
      property="og:description"
      content="Pixel-perfect screenshots, every time. Fast, reliable, and developer-friendly."
    />
    <meta
      property="og:image"
      content="https://pixelperfectapi.net/favicons/social-media/pixelperfect-og-image.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pixelperfectapi.net/" />
    <meta property="twitter:title" content="PixelPerfect - Screenshot API" />
    <meta
      property="twitter:description"
      content="Pixel-perfect screenshots, every time"
    />
    <meta
      property="twitter:image"
      content="https://pixelperfectapi.net/favicons/social-media/pixelperfect-twitter-card.png"
    />

    <!-- =====================================================================
         GOOGLE ADSENSE
         Added for site ownership verification and future ad serving.
         This script loads on all pages (SPA — single index.html).
         AdSense will only show ads on pages Google approves.
         NOTE: Ads should only be configured to appear on public marketing
         pages (landing page, blog, FAQ, docs) — NOT inside the authenticated
         dashboard, settings, or billing areas.
    ====================================================================== -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8390979835113316"
      crossorigin="anonymous"
    ></script>

  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React app mounts here -->
    <div id="root"></div>
  </body>
</html>
